services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        ports:
            - '27017:27017'
        volumes:
            - mongo-data:/data/db

    backend:
        build:
            context: ./backend
        restart: unless-stopped
        depends_on:
            - mongo
        env_file:
            - ./backend/.env
        environment:
            PORT: 8000
            MONGODB_URL: mongodb://mongo:27017/linkedin_clone
            FRONTEND_URL: http://localhost:8080
        ports:
            - '8000:8000'

    frontend:
        build:
            context: ./frontend
            args:
                VITE_API_URL: http://localhost:8000
                VITE_SOCKET_URL: http://localhost:8000
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - '8080:80'

volumes:
    mongo-data:
